<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000066"/>
      <stop offset="100%" stop-color="#000044"/>
    </linearGradient>
    <linearGradient id="chevGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4466ee"/>
      <stop offset="100%" stop-color="#0000cc"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="360" height="80" rx="12" fill="url(#bg)"/>

  <!-- Chevron group — translated into the left zone -->
  <g transform="translate(16, 8)">
    <!-- Back chevron (lightest) -->
    <polygon points="8,10 22,32 8,54 15,54 29,32 15,10" fill="#6677cc" opacity="0.55"/>
    <!-- Mid chevron -->
    <polygon points="17,10 31,32 17,54 24,54 38,32 24,10" fill="#4455bb" opacity="0.8"/>
    <!-- Front chevron -->
    <polygon points="26,10 40,32 26,54 33,54 47,32 33,10" fill="#3399ff"/>
    <!-- JS dot -->
    <circle cx="50" cy="46" r="4.5" fill="#3399ff"/>
  </g>

  <!-- "ViciJS" wordmark -->
  <text x="90" y="52" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff" letter-spacing="1">
    Vici<tspan fill="#3399ff">JS</tspan>
  </text>

  <!-- Tagline -->
  <text x="92" y="68" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#8899cc" letter-spacing="0.5">
    TypeScript SDK for ViciDial
  </text>
</svg>
