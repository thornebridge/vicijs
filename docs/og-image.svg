<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#000066"/>
      <stop offset="50%" stop-color="#000044"/>
      <stop offset="100%" stop-color="#000022"/>
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>

    <!-- Chevron gradient -->
    <linearGradient id="chevGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4488ff"/>
      <stop offset="100%" stop-color="#0044cc"/>
    </linearGradient>

    <!-- Glow filter for the chevron -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Badge background -->
    <linearGradient id="badgeBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a40"/>
      <stop offset="100%" stop-color="#060630"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Decorative line at top -->
  <rect x="0" y="0" width="1200" height="3" fill="#3399ff" opacity="0.8"/>

  <!-- Large chevron logo — left-center area -->
  <g transform="translate(100, 120) scale(3.2)" filter="url(#glow)">
    <!-- Back chevron -->
    <polygon points="8,10 26,36 8,62 17,62 35,36 17,10" fill="#5566cc" opacity="0.4"/>
    <!-- Mid chevron -->
    <polygon points="20,10 38,36 20,62 29,62 47,36 29,10" fill="#4466dd" opacity="0.65"/>
    <!-- Front chevron -->
    <polygon points="32,10 50,36 32,62 41,62 59,36 41,10" fill="url(#chevGlow)"/>
    <!-- JS dot -->
    <circle cx="63" cy="52" r="5.5" fill="#3399ff"/>
  </g>

  <!-- "ViciJS" main title -->
  <text x="370" y="260" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff" letter-spacing="3">
    Vici<tspan fill="#3399ff">JS</tspan>
  </text>

  <!-- Tagline -->
  <text x="375" y="310" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#8899cc" letter-spacing="1">
    The definitive TypeScript SDK for ViciDial
  </text>

  <!-- Divider line -->
  <line x1="375" y1="340" x2="700" y2="340" stroke="#3399ff" stroke-width="2" opacity="0.5"/>

  <!-- Stats badges row -->
  <g transform="translate(375, 370)">
    <!-- Badge 1: Functions -->
    <rect x="0" y="0" width="180" height="60" rx="8" fill="url(#badgeBg)" stroke="#2244aa" stroke-width="1.5"/>
    <text x="90" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#3399ff" text-anchor="middle">91</text>
    <text x="90" y="46" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6688bb" text-anchor="middle">API Functions</text>

    <!-- Badge 2: Parameters -->
    <rect x="200" y="0" width="180" height="60" rx="8" fill="url(#badgeBg)" stroke="#2244aa" stroke-width="1.5"/>
    <text x="290" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#3399ff" text-anchor="middle">658</text>
    <text x="290" y="46" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6688bb" text-anchor="middle">Typed Parameters</text>

    <!-- Badge 3: Dependencies -->
    <rect x="400" y="0" width="180" height="60" rx="8" fill="url(#badgeBg)" stroke="#2244aa" stroke-width="1.5"/>
    <text x="490" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#3399ff" text-anchor="middle">0</text>
    <text x="490" y="46" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#6688bb" text-anchor="middle">Dependencies</text>
  </g>

  <!-- Feature pills row -->
  <g transform="translate(375, 460)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="none" stroke="#334488" stroke-width="1"/>
    <text x="65" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#7799cc" text-anchor="middle">Type-Safe</text>

    <rect x="145" y="0" width="130" height="32" rx="16" fill="none" stroke="#334488" stroke-width="1"/>
    <text x="210" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#7799cc" text-anchor="middle">Isomorphic</text>

    <rect x="290" y="0" width="130" height="32" rx="16" fill="none" stroke="#334488" stroke-width="1"/>
    <text x="355" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#7799cc" text-anchor="middle">ESM + CJS</text>

    <rect x="435" y="0" width="150" height="32" rx="16" fill="none" stroke="#334488" stroke-width="1"/>
    <text x="510" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#7799cc" text-anchor="middle">Tree-Shakeable</text>
  </g>

  <!-- npm install badge -->
  <g transform="translate(375, 520)">
    <rect x="0" y="0" width="360" height="40" rx="6" fill="#0d0d35" stroke="#1a1a55" stroke-width="1"/>
    <text x="20" y="26" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="15" fill="#556699">$</text>
    <text x="40" y="26" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="15" fill="#aabbdd">npm install @thornebridge/vicijs</text>
  </g>

  <!-- Bottom branding bar -->
  <rect x="0" y="600" width="1200" height="30" fill="#000022"/>
  <text x="1160" y="620" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#334466" text-anchor="end">thornebridge.github.io/vicijs</text>
</svg>
